name: Labeler

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply component labels
    runs-on: ubuntu-latest
    steps:
      # Uses pull_request_target so labels can be applied to PRs from forks.
      # The labeler only reads the changed-file list — it never checks out or
      # runs PR code — so the elevated token is safe here.
      - uses: actions/labeler@v5
        with:
          sync-labels: true
