name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.pep }}

    steps:
      - uses: actions/checkout@v6

      - name: Derive package version from tag
        id: ver
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          PEP=$(echo "$RAW" | sed -E 's/-rc([0-9])/rc\1/g; s/-alpha([0-9])/a\1/g; s/-beta([0-9])/b\1/g')
          echo "pep=$PEP" >> $GITHUB_OUTPUT
          echo "Tag → PEP 440: $GITHUB_REF_NAME → $PEP"

      - name: Patch pyproject.toml version
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.ver.outputs.pep }}\"/" pyproject.toml
          grep "^version" pyproject.toml

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  build-binaries:
    name: Build binary (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: uio-linux-x86_64
          - os: macos-latest
            asset_name: uio-macos-arm64
          - os: windows-latest
            asset_name: uio-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller .

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.asset_name }} uio/cli/main.py

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}
          path: dist/${{ matrix.asset_name }}*

  build-binary-macos-x86:
    name: Build binary (uio-macos-x86_64)
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller .

      - name: Build binary
        run: pyinstaller --onefile --name uio-macos-x86_64 uio/cli/main.py

      - uses: actions/upload-artifact@v7
        with:
          name: binary-macos-13
          path: dist/uio-macos-x86_64*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  upload-binaries:
    name: Upload fast binaries to release
    needs: [github-release, build-binaries]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binary-ubuntu-latest
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-macos-latest
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-windows-latest
          path: binaries/

      - uses: softprops/action-gh-release@v3
        with:
          files: binaries/*

  upload-macos-x86:
    name: Upload macOS x86_64 binary to release
    needs: [github-release, build-binary-macos-x86]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binary-macos-13
          path: binaries/

      - uses: softprops/action-gh-release@v3
        with:
          files: binaries/*

  build-image:
    name: Build and push Docker image
    needs: [publish-pypi, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Wait for uio-ai to appear on PyPI
        run: |
          version="${{ needs.build.outputs.version }}"
          echo "Polling PyPI for uio-ai==$version ..."
          for i in $(seq 1 20); do
            if curl -sf "https://pypi.org/pypi/uio-ai/$version/json" > /dev/null; then
              echo "Available after $i attempt(s)."
              exit 0
            fi
            echo "  [$i/20] not yet available, retrying in 15s..."
            sleep 15
          done
          echo "Timed out waiting for uio-ai==$version on PyPI" >&2
          exit 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: UIO_VERSION=${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
