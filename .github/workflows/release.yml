name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  build-binaries:
    name: Build binary (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: uio-linux-x86_64
          - os: macos-13
            asset_name: uio-macos-x86_64
          - os: macos-latest
            asset_name: uio-macos-arm64
          - os: windows-latest
            asset_name: uio-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller .

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.asset_name }} uio/cli/main.py

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}
          path: dist/${{ matrix.asset_name }}*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  github-release:
    name: Create GitHub Release
    needs: [build, build-binaries]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: binary-ubuntu-latest
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-macos-13
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-macos-latest
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-windows-latest
          path: binaries/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            binaries/*
          generate_release_notes: true
