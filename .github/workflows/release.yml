name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.pep }}

    steps:
      - uses: actions/checkout@v6

      - name: Derive package version from tag
        id: ver
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          PEP=$(echo "$RAW" | sed -E 's/-rc([0-9])/rc\1/g; s/-alpha([0-9])/a\1/g; s/-beta([0-9])/b\1/g')
          echo "pep=$PEP" >> $GITHUB_OUTPUT
          echo "Tag → PEP 440: $GITHUB_REF_NAME → $PEP"

      - name: Patch pyproject.toml version
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.ver.outputs.pep }}\"/" pyproject.toml
          grep "^version" pyproject.toml

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  build-binaries:
    name: Build binary (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: uio-linux-x86_64
            install_cmd: pip install pyinstaller .
            build_cmd: pyinstaller --onefile --name uio-linux-x86_64 uio/cli/main.py
          - os: ubuntu-24.04-arm
            asset_name: uio-linux-arm64
            install_cmd: pip install pyinstaller .
            build_cmd: pyinstaller --onefile --name uio-linux-arm64 uio/cli/main.py
          - os: macos-latest
            asset_name: uio-macos-arm64
            install_cmd: pip install pyinstaller .
            build_cmd: pyinstaller --onefile --name uio-macos-arm64 uio/cli/main.py
          - os: macos-latest
            asset_name: uio-macos-x86_64
            # Rosetta 2: install and build under x86_64 slice of the universal2 Python
            install_cmd: arch -x86_64 pip install pyinstaller .
            build_cmd: arch -x86_64 pyinstaller --onefile --name uio-macos-x86_64 uio/cli/main.py
          - os: windows-latest
            asset_name: uio-windows-x86_64.exe
            install_cmd: pip install pyinstaller .
            build_cmd: pyinstaller --onefile --name uio-windows-x86_64 uio/cli/main.py

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: ${{ matrix.install_cmd }}

      - name: Build binary
        run: ${{ matrix.build_cmd }}

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  build-binary-linux-musl:
    name: Build binary (uio-linux-x86_64-musl)
    runs-on: ubuntu-latest
    container: python:3.12-alpine

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apk add --no-cache gcc musl-dev binutils

      - name: Install dependencies
        run: pip install pyinstaller .

      - name: Build binary
        run: pyinstaller --onefile --name uio-linux-x86_64-musl uio/cli/main.py

      - uses: actions/upload-artifact@v7
        with:
          name: binary-uio-linux-x86_64-musl
          path: dist/uio-linux-x86_64-musl

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  upload-binaries:
    name: Upload fast binaries to release
    needs: [github-release, build-binaries, build-binary-linux-musl]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binary-uio-linux-x86_64
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-uio-linux-arm64
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-uio-macos-arm64
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-uio-macos-x86_64
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-uio-windows-x86_64.exe
          path: binaries/

      - uses: actions/download-artifact@v8
        with:
          name: binary-uio-linux-x86_64-musl
          path: binaries/

      - uses: softprops/action-gh-release@v3
        with:
          files: binaries/*

  build-image:
    name: Build and push Docker image
    needs: [publish-pypi, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Pre-bundle npm MCP packages and github-mcp-server binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install --prefix mcp-vendor \
            @modelcontextprotocol/server-filesystem \
            @modelcontextprotocol/server-sequential-thinking
          mkdir -p mcp-vendor/bin
          for arch_pair in "amd64:x86_64" "arm64:arm64"; do
            DOCKER_ARCH="${arch_pair%%:*}"
            GH_ARCH="${arch_pair##*:}"
            URL=$(gh api repos/github/github-mcp-server/releases/latest \
              --jq ".assets[].browser_download_url" \
              | grep "Linux_${GH_ARCH}\.tar\.gz$")
            curl -fsSL "$URL" | tar -xz -C mcp-vendor/bin github-mcp-server
            mv mcp-vendor/bin/github-mcp-server "mcp-vendor/bin/github-mcp-server-${DOCKER_ARCH}"
          done

      - name: Wait for uio-ai to appear on PyPI
        run: |
          version="${{ needs.build.outputs.version }}"
          echo "Polling PyPI for uio-ai==$version ..."
          for i in $(seq 1 20); do
            if pip install --dry-run --no-deps --no-cache-dir "uio-ai==$version" 2>/dev/null; then
              echo "Available after $i attempt(s)."
              exit 0
            fi
            echo "  [$i/20] not yet available, retrying in 15s..."
            sleep 15
          done
          echo "Timed out waiting for uio-ai==$version on PyPI" >&2
          exit 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: UIO_VERSION=${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
